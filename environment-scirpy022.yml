name: benisse-scirpy022
channels:
  - conda-forge
  - defaults
dependencies:
  - python=3.10
  - pip
  # Torch 2.2.2 predates NumPy 2 and is the last release with Intel-macOS
  # wheels, so keep the encoder on the project's proven NumPy 1.x version.
  - numpy=1.26.4
  # Pin the last readily available Intel-macOS wheel pair. Without these pins,
  # pip selects Numba 0.66 and attempts an unsupported local OpenMP/LLVM build.
  - numba=0.61.2
  - llvmlite=0.44.0
  - pip:
      - pytest==9.1.1
      - scirpy==0.22.3
      - torch==2.2.2
